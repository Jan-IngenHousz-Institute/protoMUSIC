; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio] 
src_dir = main 

[env:esp32-s3-devkitm-1] 
platform = espressif32
board = esp32-s3-devkitm-1
framework = espidf
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = partitions.csv
board_build.sdkconfig_defaults = sdkconfig.defaults
monitor_speed = 115200
monitor_filters = send_on_enter
extra_scripts =
    pre:tools/extra_script.py
    ; post:tools/set_rtc_on_upload.py
; Step-0 SD append-only spike (docs/append-log-persistence-plan.md). Uncomment to
; run the throwaway corruption spike instead of the normal firmware. The spike
; PASSED (zero corruption, flat heap, ~30 min on the field card), so normal
; operation now uses the append-only event_log component it validated.
; build_flags = -DSPIKE_LOG=1
;
; Stage-0 OTA spike (docs/ota-update-plan.md). Uncomment BOTH flags to run the
; throwaway esp_https_ota download test instead of normal firmware — answers
; whether GitHub's TLS handshake fits the 8 KiB record buffer on this board. It
; aborts before finish, so it NEVER changes the boot partition. Point the URL at a
; real esp32s3 firmware.bin (a release asset or a raw branch path). Requires the
; cert bundle in sdkconfig.defaults (delete sdkconfig.esp32-s3-devkitm-1 to apply).
; build_flags =
;     -DSPIKE_OTA=1
;     -DSPIKE_OTA_URL='"https://github.com/Jan-IngenHousz-Institute/protoMUSIC/releases/download/ota-spike-test/firmware.bin"'
 


