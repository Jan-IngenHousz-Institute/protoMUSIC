; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio] 
src_dir = main 

[env:esp32-s3-devkitm-1] 
platform = espressif32
board = esp32-s3-devkitm-1
framework = espidf
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = partitions.csv
board_build.sdkconfig_defaults = sdkconfig.defaults
monitor_speed = 115200
monitor_filters = send_on_enter
extra_scripts = pre:tools/extra_script.py
; Step-0 SD append-only spike (docs/append-log-persistence-plan.md). Comment this
; line out to return to the normal firmware.
build_flags = -DSPIKE_LOG=1
 
